# Local dev dependencies for TEAS. Brings up PostgreSQL pre-created as `accounting_dev`
# with the credentials the backend's appsettings.json expects, so a fresh clone can go
# straight to `dotnet run` (DbInitializer migrates + seeds on startup). Redis is optional
# (only used for distributed caching) and left commented out.
#
#   docker compose up -d
#
services:
  postgres:
    image: postgres:16
    container_name: teas-postgres
    environment:
      POSTGRES_USER: accounting
      POSTGRES_PASSWORD: accounting_dev_password
      POSTGRES_DB: accounting_dev
    ports:
      - "5432:5432"
    volumes:
      - teas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting -d accounting_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:7
  #   ports: ["6379:6379"]

volumes:
  teas_pgdata:
