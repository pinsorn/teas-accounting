      tags: [Company Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyProfileSoftUpdate'
      responses:
        '204':
          description: Updated
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelopeV1'
        '403':
          description: Missing master.company.manage scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelopeV1'

  /company-profile/hard:
    put:
      summary: Update hard fields (Phase 1 = 501 Not Implemented)
      description: |
        Hard fields (legal_name, tax_id, registration_number, registered_address_*,
        vat_registration_date, branch_code) are read-only via UI in Phase 1.
        Always returns 501 with explanation pointing to ภ.พ.09 workaround
        (file with revenue department + ops update DB manually with audit log).

        Phase 2 will add 2-person approval workflow + effective-date history
        + ภ.พ.09 attachment upload.
      tags: [Company Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyProfileHardUpdate'
      responses:
        '501':
          description: 'Not implemented in Phase 1 — type=company_profile.hard_locked'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelopeV1'
        '403':
          description: Missing master.company.manage scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelopeV1'

  # ============================================================
  # WHT TYPES — Reactivate (Sprint 13f-P2; mirrors BU/Product Restore)
  # ============================================================
  /wht-types/{id}/reactivate:
    post:
      summary: Reactivate a deactivated WHT type
      description: |
        Sets `isActive=true` for a previously deactivated WHT type. Tenant-scoped
        (Sprint 13f-P1 explicit CompanyId filter — defense-in-depth, do not rely
        on RLS alone). Mirrors the BU/Product Restore pattern from Sprint 13d-P4.

        FE: PermissionGate-wrapped "↺ เปิดใช้งานใหม่" button appears for inactive
        rows when user has `tax.wht_type.manage`.
      tags: [WHT Types]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Reactivated
        '403':
          description: Missing tax.wht_type.manage scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelopeV1'
        '404':
          description: 'Not found in tenant scope (cross-tenant or deleted)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelopeV1'

  # ============================================================
  # ADMIN — ApiKey management (BFF/JWT only, perm: sys.api_key.manage)
  # Sprint 14 P2
  # ============================================================
  /api-keys:
    get:
      summary: List API keys for current company
      tags: [API Keys]
      responses:
        '200':
          description: OK — list of keys with prefix (NOT plaintext), scopes, default_BU, expiry, last_used_at
    post:
      summary: Create new API key (plaintext returned ONCE, then bcrypt hash + 16-char prefix stored)
      tags: [API Keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              properties:
                name: { type: string, description: 'Descriptive label (e.g. "Shopify Reptify Integration")' }
                scopes:
                  type: array
                  items: { type: string, example: 'sales.tax_invoice.create' }
                default_business_unit_id:
                  type: integer
                  nullable: true
                  description: 'When set: docs auto-tag with this BU; request body mismatch → 409 business_unit.locked_mismatch'
                expires_at: { type: string, format: date-time, nullable: true }
      responses:
        '201':
          description: Created — plaintext key returned ONCE. Caller MUST save it; never retrievable again.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key_id: { type: integer, format: int64 }
                  name: { type: string }
                  key_prefix: { type: string, example: 'key_a1b2c3d4...wxyz' }
                  plaintext: { type: string, example: 'key_abcdef1234567890abcdef1234567890abcdef12' }
                  scopes: { type: array, items: { type: string } }
                  default_business_unit_id: { type: integer, nullable: true }
                  expires_at: { type: string, format: date-time, nullable: true }

  /api-keys/{id}:
    parameters:
      - $ref: '#/components/parameters/DocId'
    delete:
      summary: Revoke API key (sets revoked_at + is_active=false; key fails 401 immediately on next use)
      tags: [API Keys]
      responses:
        '204': { description: Revoked }

  /api-keys/{id}/rotate:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Rotate API key (old key invalid immediately; new plaintext returned ONCE)
      tags: [API Keys]
      responses:
        '200':
          description: Rotated — new plaintext key returned (same one-time-display contract as create)

# ============================================================
# /api/v1/* — EXTERNAL API (X-Api-Key auth ONLY, JWT rejected here)
# Sprint 14 P3+
# Auth isolation: ApiKey scheme pinned via apiperm:<scope> policy.
# Every POST/PUT/PATCH REQUIRES `Idempotency-Key` header (Sprint 14 P4).
# Error responses use the standard envelope (Sprint 14 P5; v1 only — root keeps RFC 7807).
# ============================================================
  /api/v1/tax-invoices:
    post:
      summary: '[v1] Create Tax Invoice (microservice integration)'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Same shape as `CreateTaxInvoiceRequest`. If API key has `default_business_unit_id` set:
                - Omit `business_unit_id` → auto-fill from key
                - Specify matching `business_unit_id` → OK
                - Specify different `business_unit_id` → 409 `business_unit.locked_mismatch`
              properties:
                customer_id: { type: integer, format: int64 }
                doc_date: { type: string, format: date }
                business_unit_id: { type: integer, nullable: true, description: 'Optional; subject to key lock' }
                lines:
                  type: array
                  items: { type: object }
      responses:
        '201':
          description: 'Created (or replayed via Idempotency-Key match — see `Idempotency-Replayed: true` header)'
        '400': { description: 'Validation error or idempotency.required (missing Idempotency-Key header on mutation)' }
        '401': { description: 'auth.* (missing/invalid/expired/revoked API key)' }
        '403': { description: 'auth.scope_required (key lacks sales.tax_invoice.create scope)' }
        '409':
          description: |
            One of:
            - `idempotency.body_mismatch` — same Idempotency-Key with different body within 24h TTL
            - `business_unit.locked_mismatch` — request BU differs from key's default_business_unit_id
            - `business_unit.cross_bu_not_allowed_for_this_key` — receipt apply spans multiple BUs (API key callers locked to single-BU)

  /api/v1/tax-invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: '[v1] Get Tax Invoice'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]
      responses:
        '200': { description: OK }

  /api/v1/tax-invoices/{id}/post:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: '[v1] Post Tax Invoice — allocates doc_no using key BU sub-prefix (e.g. MM-YYYY-TI-REPT-NNNN)'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'

  /api/v1/receipts:
    post:
      summary: '[v1] Create Receipt'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'

  /api/v1/quotations:
    post:
      summary: '[v1] Create Quotation'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'

  /api/v1/customers:
    get:
      summary: '[v1] List/search customers (microservice maps external email/code → TEAS customer_id)'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]
    post:
      summary: '[v1] Create customer'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'

  /api/v1/products:
    get:
      summary: '[v1] List products (microservice maps SKU → TEAS product_id)'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]

  /api/v1/system/info:
    get:
      summary: '[v1] System info (vat_mode, version, etc.)'
      tags: [External API v1]
      security: [{ ApiKeyAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  vat_mode: { type: boolean }
                  vat_rate: { type: number }
                  pnd30_submission_mode: { type: string, enum: [auto, manual] }
                  document_number_format: { type: string, example: 'MM-YYYY-PREFIX-NNNN or MM-YYYY-PREFIX-SUB-NNNN with BU' }
                  timezone: { type: string, example: 'Asia/Bangkok' }
        '401': { $ref: '#/components/responses/ErrorEnvelope401' }

# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: |
        Format: `key_<40-char-random>`. Issued via `POST /api-keys` (admin BFF).
        Plaintext returned once on create/rotate; only bcrypt hash + 16-char prefix stored.
        Scoped per-key (ScopesJson array of permission strings) + optional default_business_unit_id (auto-fill + lock per binding behavior).
        Required on all `/api/v1/*` endpoints (auth isolation: JWT not accepted on v1; ApiKey not accepted on root).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'BFF cookie-based JWT for human users via /auth/login. Required on all root endpoints (auth isolation: ApiKey not accepted on root).'
    OAuth2:
      type: oauth2
      description: 'Reserved for Phase 2 client_credentials flow when first customer demands OAuth. API key sufficient for Phase 1.'
      flows:
        clientCredentials:
          tokenUrl: https://api.your-teas.example/oauth/token
          scopes:
            read: Read access
            write: Write access
            admin: Admin access

  parameters:
    DocId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: UUID v4 to prevent duplicate operations
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 50, maximum: 200 }

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict (idempotency / state)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    # === /api/v1/* error envelope per Sprint 14 P5 + plan §20.7 ===
    ErrorEnvelope401:
      description: 'Authentication failed. Body uses v1 envelope.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelopeV1'

  schemas:
    # === CIT Phase C-C (ภ.ง.ด.50 foundations) ===
    Pnd50Preview:
      type: object
      description: >
        ภ.ง.ด.50 dashboard dry-run — same figures the PDF filler prints (single source) plus the
        refusal codes that would 422 the /pdf endpoint. All amounts THB; signed where the form uses
        a sign radio (ladder rows, retained earnings).
      properties:
        year: { type: integer }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        isSme: { type: boolean }
        paidUpCapital: { type: number, nullable: true }
        revenue: { type: number }
        expenses: { type: number }
        pnd51EstimatedProfit: { type: number, nullable: true }
        pnd51Prepaid: { type: number }
        whtCreditTotal: { type: number, description: FY AR-side 50ทวิ credit (box 54) }
        whtCertificates:
          type: array
          items: { $ref: '#/components/schemas/Pnd50WhtCert' }
        ladder:
          oneOf:
            - { $ref: '#/components/schemas/Pnd50Ladder' }
            - { type: 'null' }
          description: null when a refusal prevented building it
        adjustments:
          type: array
          items: { $ref: '#/components/schemas/CitAdjustment' }
        taxBeforeCredits: { type: number }
        creditsTotal: { type: number }
        netPayable: { type: number, description: absolute value; see payMore for direction }
        payMore: { type: boolean, description: true ชำระเพิ่มเติม, false ชำระไว้เกิน }
        surcharge: { type: number, description: ม.67ตรี under-estimate penalty (0 when none) }
        totalDue: { type: number }
        balanceSheet: { $ref: '#/components/schemas/Pnd50BalanceSheet' }
        refusals:
          type: array
          items: { type: string }
          description: >
            empty when renderable; otherwise any of pnd50.override_breaks_ladder,
            pnd50.ladder_sign_flip, pnd50.surcharge_with_overpaid
    Pnd50Ladder:
      type: object
      description: p3 รายการที่ 2 ladder (signed). Foots 1−2=3 · 3+4=5 · 5−6=7 · 7−8=9 · 9+10+11=12 · 12−13=14 · 14−15=16 · 16+17+18+19=20.
      properties:
        directRevenue: { type: number }
        costOfSales: { type: number }
        grossProfit: { type: number }
        otherIncome: { type: number }
        total5: { type: number }
        otherExpenses: { type: number }
        total7: { type: number }
        sellingAdminExpenses: { type: number }
        accountingNetProfit: { type: number }
        incomeAdditions: { type: number }
        disallowedExpenses: { type: number, description: row 11 — Σ positive ม.65ทวิ/ตรี adjustments }
        total12: { type: number }
        exemptDeductions: { type: number, description: row 13 — |Σ negative adjustments| }
        total14: { type: number, description: == CitComputation.TaxableBeforeLoss }
        lossCarryForward: { type: number, description: row 15 — ม.65ตรี(12) applied loss }
        total16: { type: number }
        total20: { type: number }
        taxableNetProfit: { type: number, description: row 21 → flows to p2 box 48-49 }
    Pnd50BalanceSheet:
      type: object
      description: p6 งบฐานะ totals (account-code classified). RetainedEarnings signed (→ Group91).
      properties:
        cashAndEquivalents: { type: number }
        tradeReceivables: { type: number }
        inventory: { type: number }
        otherCurrentAssets: { type: number }
        otherNonCurrentAssets: { type: number }
        totalAssets: { type: number }
        tradePayables: { type: number }
        otherCurrentLiabilities: { type: number }
        otherNonCurrentLiabilities: { type: number }
        totalLiabilities: { type: number }
        paidUpShareCapital: { type: number }
        otherEquity: { type: number }
        retainedEarnings: { type: number }
        totalEquity: { type: number }
        totalLiabilitiesAndEquity: { type: number }
        balanced: { type: boolean }
    Pnd50WhtCert:
      type: object
      description: One AR-side 50ทวิ certificate counted into the box-54 WHT credit.
      properties:
        docNo: { type: string }
        docDate: { type: string, format: date }
        customerName: { type: string }
        customerTaxId: { type: string, nullable: true }
        whtAmount: { type: number }
        customerWhtCertNo: { type: string, nullable: true, description: null = cert not yet received }
    CitYearSummary:
      type: object
      description: Per-fiscal-year CIT store — loss c/f (ม.65ตรี(12), override-able) + ภ.ง.ด.51 estimate (ม.67ตรี).
      properties:
        fiscalYear: { type: integer, description: CE year the FY starts in }
        computedNetProfit: { type: number, nullable: true }
        overrideNetProfit: { type: number, nullable: true }
        effectiveNetProfit: { type: number, nullable: true, description: 'override ?? computed; loss < 0' }
        pnd51EstimatedProfit: { type: number, nullable: true }
        pnd51Prepaid: { type: number, nullable: true }
        note: { type: string, nullable: true }
    CitAdjustment:
      type: object
      properties:
        citAdjustmentId: { type: integer, format: int64 }
        fiscalYear: { type: integer }
        legalRefCode: { type: string, maxLength: 50, description: 'e.g. ม.65ตรี(3)' }
        label: { type: string, maxLength: 255 }
        amount: { type: number, description: 'signed — add-back > 0, deduction/exempt < 0' }
    UpsertCitAdjustment:
      type: object
      required: [legalRefCode, label, amount]
      properties:
        legalRefCode: { type: string, maxLength: 50 }
        label: { type: string, maxLength: 255 }
        amount: { type: number }
    BalanceSheetSection:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              accountCode: { type: string }
              accountNameTh: { type: string }
              balance: { type: number }
        total: { type: number }

    # === Reports (Sprint 13j-PURCH Phase B) ===
    ApAgingRow:
      type: object
      description: One AP-aging row per vendor (VendorId=0, VendorName=TOTAL for the totals row).
      properties:
        vendorId: { type: integer, format: int32 }
        vendorName: { type: string }
        vendorTaxId: { type: string }
        current: { type: number, format: double, description: 'Outstanding aged ≤30 days' }
        bucket31To60: { type: number, format: double }
        bucket61To90: { type: number, format: double }
        bucketOver90: { type: number, format: double }
        total: { type: number, format: double }

    # === Common ===
    ErrorResponse:
      type: object
      description: 'DEPRECATED — was legacy RFC 7807 root envelope. Sprint 13d-P5 unified ALL paths to use ErrorEnvelopeV1 (root + /api/v1/*). Refs remain only for backward compatibility; treat as alias for ErrorEnvelopeV1.'
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelopeV1'

    # === Unified error envelope — all paths (Sprint 13d-P5 + plan §20.7) ===
    ErrorEnvelopeV1:
      type: object
      description: |
        Unified RFC-7807-style error envelope for ALL TEAS paths (root BFF
        + /api/v1/* + /api/proxy/*). Sprint 13d-P5 collapsed the prior
        root-vs-v1 split into this single shape via
        ValidationErrorEnvelopeMiddleware (transparent reshape).

        Stable error type catalog (urn:teas:error:*):
        - auth.unauthenticated | auth.forbidden
        - auth.missing_api_key | auth.invalid_api_key | auth.expired_api_key | auth.revoked_api_key | auth.scope_required
        - idempotency.required | idempotency.body_mismatch | idempotency.conflict
        - validation                                           (validation failures use fieldErrors[])
        - tenant.cross_tenant_access | tenant.required
        - business_unit.required | business_unit.locked_mismatch | business_unit.cross_bu_not_allowed_for_this_key
        - bu.duplicate | product.duplicate | wht_type.duplicate (business-rule uniqueness violations)
        - company_profile.hard_locked                          (PUT /company-profile/hard always returns 501)
        - period.closed | document.immutable_after_post
        - notfound                                             (resource id not in tenant scope)
        - internal                                             (uncaught 5xx)
        - rate_limit.exceeded (Phase 2)
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          example: 'urn:teas:error:validation'
          description: 'URN identifying the error class. Stable for programmatic handling.'
        title:
          type: string
          example: 'validation'
          description: 'i18n key (NOT human English). FE resolves to current locale.'
        detail:
          type: string
          example: 'Request validation failed (2 field(s)).'
          description: 'Optional human-readable detail in service origin locale. Mainly for logs/debugging.'
        status:
          type: integer
          example: 400
          description: 'Matches the HTTP status code.'
        fieldErrors:
          type: array
          description: 'Present for validation failures (400). Empty/absent for business-rule errors.'
          items:
            type: object
            required: [field, messages]
            properties:
              field:
                type: string
                example: 'code'
                description: 'camelCase field name matching request JSON shape (NOT C# Pascal DTO).'
              messages:
                type: array
                description: 'Array of i18n keys (typically validation.<rule>). FE resolves + can show inline beside the field.'
                items:
                  type: string
                  example: 'validation.required'
        trace_id: { type: string, example: 'abc123def456', description: 'From Activity.Current?.Id' }
        request_id: { type: string, example: 'req_xyz789', description: 'From HttpContext.TraceIdentifier' }

    Meta:
      type: object
      properties:
        request_id: { type: string }
        timestamp: { type: string, format: date-time }

    Pagination:
      type: object
      properties:
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    Address:
      type: object
      properties:
        line1: { type: string }
        line2: { type: string }
        sub_district: { type: string }
        district: { type: string }
        province: { type: string }
        postal_code: { type: string }
        country: { type: string, default: TH }

    # === Company Profile (Sprint 13d-P6, plan §6.7) ===
    CompanyProfile:
      type: object
      description: 'Tenant company profile. Hard fields are read-only via UI in Phase 1.'
      properties:
        companyId: { type: integer }
        # Hard fields — read-only via UI Phase 1
        legalName: { type: string, example: 'บริษัท แมนนวล เดโม จำกัด' }
        taxId: { type: string, example: '0000000000002' }
        registrationNumber: { type: string, example: '0000000000002' }
        registeredAddressLine1: { type: string }
        registeredAddressLine2: { type: string, nullable: true }
        registeredSubdistrict: { type: string }
        registeredDistrict: { type: string }
        registeredProvince: { type: string }
        registeredPostalCode: { type: string, example: '10110' }
        vatRegistrationDate: { type: string, format: date, nullable: true }
        branchCode: { type: string, example: '00000' }
        # Soft fields — admin-editable Phase 1
        tradeName: { type: string, nullable: true }
        logoUrl: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        website: { type: string, nullable: true }
        contactName: { type: string, nullable: true }
        bankName: { type: string, nullable: true }
        bankAccountNo: { type: string, nullable: true }
        bankAccountName: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }
        updatedByUserId: { type: integer, nullable: true }

    CompanyProfileSoftUpdate:
      type: object
      description: 'Editable fields only. All optional — omitted fields are unchanged.'
      properties:
        tradeName: { type: string, nullable: true }
        logoUrl: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        website: { type: string, nullable: true }
        contactName: { type: string, nullable: true }
        bankName: { type: string, nullable: true }
        bankAccountNo: { type: string, nullable: true }
        bankAccountName: { type: string, nullable: true }

    CompanyProfileHardUpdate:
      type: object
      description: |
        Hard-field update request body. Phase 1 endpoint always returns 501;
        this schema is documented for Phase 2 contract (when 2-person approval
        + ภ.พ.09 attachment is added). DO NOT call /company-profile/hard
        expecting success in Phase 1.
      properties:
        legalName: { type: string }
        taxId: { type: string }
        registrationNumber: { type: string }
        registeredAddressLine1: { type: string }
        registeredAddressLine2: { type: string, nullable: true }
        registeredSubdistrict: { type: string }
        registeredDistrict: { type: string }
        registeredProvince: { type: string }
        registeredPostalCode: { type: string }
        vatRegistrationDate: { type: string, format: date, nullable: true }
        branchCode: { type: string }

    LineItem:
      type: object
      required: [description, quantity, unit_price]
      properties:
        product_id: { type: integer, nullable: true }
        product_code: { type: string, nullable: true }
        description: { type: string }
        quantity: { type: number }
        uom_id: { type: integer }
        unit_price: { type: number }
        discount_percent: { type: number, default: 0 }
        discount_amount: { type: number, default: 0 }
        tax_code: { type: string, example: VAT-OUT-7 }
        cost_center_id: { type: integer, nullable: true }
        project_id: { type: integer, nullable: true }

    # === Quotation ===
    QuotationCreateRequest:
      type: object
      required: [customer_id, valid_until, lines]
      properties:
        customer_id: { type: integer }
        valid_until: { type: string, format: date }
        billing_address: { type: string }
        shipping_address: { type: string }
        currency_code: { type: string, default: THB }
        is_tax_inclusive: { type: boolean, default: false }
        payment_terms: { type: string }
        delivery_terms: { type: string }
        notes: { type: string }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'

    QuotationUpdateRequest:
      $ref: '#/components/schemas/QuotationCreateRequest'

    Quotation:
      type: object
      properties:
        quotation_id: { type: integer }
        doc_no: { type: string, example: 05-2026-QT-0001 }
        doc_date: { type: string, format: date }
        valid_until: { type: string, format: date }
        revision_no: { type: integer }
        customer_id: { type: integer }
        status: { type: string, enum: [DRAFT, SUBMITTED, SENT, ACCEPTED, REJECTED, EXPIRED, CANCELLED] }
        subtotal_amount: { type: number }
        tax_amount: { type: number }
        total_amount: { type: number }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'

    QuotationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Quotation'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # === Sales Order ===
    SalesOrderCreateRequest:
      type: object
      required: [customer_id, lines]
      properties:
        customer_id: { type: integer }
        quotation_id: { type: integer, nullable: true }
        customer_po_no: { type: string, nullable: true }
        expected_delivery_date: { type: string, format: date, nullable: true }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'

    SalesOrder:
      type: object
      properties:
        so_id: { type: integer }
        doc_no: { type: string, example: 05-2026-SO-0001 }
        status: { type: string, enum: [DRAFT, CONFIRMED, PARTIAL, DELIVERED, CLOSED, CANCELLED] }

    # === Delivery Order ===
    DeliveryOrderCreateRequest:
      type: object
      required: [customer_id, shipping_address, lines]
      properties:
        so_id: { type: integer, nullable: true }
        customer_id: { type: integer }
        delivery_date: { type: string, format: date }
        shipping_address: { type: string }
        carrier_name: { type: string }
        vehicle_no: { type: string }
        driver_name: { type: string }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'

    # === Tax Invoice ===
    TaxInvoiceCreateRequest:
      type: object
      required: [customer_id, lines]
      properties:
        so_id: { type: integer, nullable: true }
        do_id: { type: integer, nullable: true }
        customer_id: { type: integer }
        customer_po_no: { type: string, nullable: true }
        currency_code: { type: string, default: THB }
        exchange_rate: { type: number, default: 1 }
        is_tax_inclusive: { type: boolean, default: false }
        payment_terms: { type: string }
        notes: { type: string }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'

    TaxInvoice:
      type: object
      properties:
        tax_invoice_id: { type: integer }
        doc_no: { type: string, example: 05-2026-TI-0001 }
        doc_date: { type: string, format: date }
        tax_point_date: { type: string, format: date }
        customer:
          type: object
          properties:
            id: { type: integer }
            tax_id: { type: string }
            branch_code: { type: string }
            name: { type: string }
            address: { type: string }
        subtotal_amount: { type: number }
        tax_amount: { type: number }
        total_amount: { type: number }
        status: { type: string, enum: [DRAFT, POSTED] }
        payment_status: { type: string, enum: [UNPAID, PARTIAL, PAID] }
        e_tax_status: { type: string, enum: [PENDING, QUEUED, SUBMITTED, ACKNOWLEDGED, REJECTED] }
        e_tax_xml_url: { type: string, nullable: true }
        e_tax_pdf_url: { type: string, nullable: true }
        e_tax_ack_id: { type: string, nullable: true }
        delivered_to_customer: { type: boolean }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'

    EtaxStatus:
      type: object
      properties:
        status: { type: string }
        signed_at: { type: string, format: date-time, nullable: true }
        submitted_at: { type: string, format: date-time, nullable: true }
        acknowledged_at: { type: string, format: date-time, nullable: true }
        rd_reference: { type: string, nullable: true }
        rejection_reason: { type: string, nullable: true }

    TaxInvoiceListItem:
      type: object
      description: 'Compact row shape used by GET /tax-invoices list. Field names are camelCase per shipped contract.'
      properties:
        taxInvoiceId: { type: integer, format: int64 }
        docNo:        { type: string, example: 05-2026-TI-0001 }
        docDate:      { type: string, format: date }
        customerName: { type: string }
        customerTaxId: { type: string, nullable: true }
        totalAmount:  { type: number }
        taxAmount:    { type: number }
        status:       { type: string, enum: [Draft, Posted] }
        paymentStatus: { type: string, enum: [UNPAID, PARTIAL, PAID] }
        currencyCode: { type: string, example: THB }

    TaxInvoiceListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/TaxInvoiceListItem' }
        nextCursor:
          type: integer
          format: int64
          nullable: true
          description: 'Last taxInvoiceId of the page; pass to `cursor` for next page. `null` when no more.'
        hasMore: { type: boolean }

    CustomerListItem:
      type: object
      description: 'Minimal customer row used by GET /customers list + selectors. CustomerSelector consumes this shape.'
      properties:
        customerId: { type: integer, format: int64 }
        nameTh:     { type: string }
        nameEn:     { type: string, nullable: true }
        taxId:      { type: string, nullable: true }
        branchCode: { type: string, nullable: true }
        vatRegistered: { type: boolean }

    NumberGapsResponse:
      type: object
      description: 'Number-gap audit result. Compliance §17.6 / §4.3 — `hasGaps=true` is a defect.'
      properties:
        year:    { type: integer, example: 2026 }
        month:   { type: integer, example: 5 }
        docType: { type: string, nullable: true, example: TI }
        gaps:
          type: array
          items:
            type: object
            properties:
              series:        { type: string, example: 05-2026-TI }
              missingSeqNo:  { type: integer, example: 7 }
              missingDocNo:  { type: string, nullable: true, example: 05-2026-TI-0007 }
        hasGaps: { type: boolean }

    # === Credit / Debit Note ===
    CreditNoteCreateRequest:
      type: object
      required: [original_invoice_id, reason_code, reason_text, lines]
      properties:
        original_invoice_id: { type: integer }
        reason_code:
          type: string
          enum: [TYPO, AMOUNT_ERROR, CUSTOMER_INFO, RETURN, PRICE_REDUCE, CANCEL]
        reason_text: { type: string }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'

    DebitNoteCreateRequest:
      type: object
      required: [original_invoice_id, reason_text, lines]
      properties:
        original_invoice_id: { type: integer }
        reason_text: { type: string }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'

    # === Customer Receipt ===
    CreateReceiptRequest:
      type: object
      description: 'Shipped contract of POST /receipts (camelCase JSON; replaces the stale CustomerReceiptCreateRequest).'
      required: [docDate, customerId, paymentMethod, currencyCode, exchangeRate, applications]
      properties:
        docDate: { type: string, format: date, description: 'Server enforces today (Asia/Bangkok)' }
        customerId: { type: integer, format: int64 }
        paymentMethod: { type: string, enum: [Cash, Transfer, Cheque, CreditCard] }
        chequeNo: { type: string, nullable: true }
        chequeDate: { type: string, format: date, nullable: true }
        bankAccountId: { type: integer, format: int64, nullable: true }
        currencyCode: { type: string, example: THB }
        exchangeRate: { type: number, example: 1 }
        notes: { type: string, nullable: true }
        businessUnitId: { type: integer, nullable: true }
        applications:
          type: array
          description: 'Apply-mode: exactly ONE of taxInvoiceId / deliveryOrderId / billingNoteId per item. Empty array = standalone non-VAT receipt (use lines).'
          items:
            type: object
            required: [appliedAmount]
            properties:
              taxInvoiceId: { type: integer, format: int64, nullable: true }
              deliveryOrderId: { type: integer, format: int64, nullable: true }
              billingNoteId: { type: integer, format: int64, nullable: true }
              appliedAmount: { type: number }
        whtAmount: { type: number, default: 0, description: 'LEGACY single-category WHT (use whtLines instead)' }
        whtTypeId: { type: integer, nullable: true }
        customerWhtCertNo: { type: string, nullable: true }
        customerWhtCertDate: { type: string, format: date, nullable: true }
        whtLines:
          type: array
          description: 'Preferred multi-income-type WHT the customer withheld; rate/amount computed server-side.'
          items:
            type: object
            required: [whtTypeId, baseAmount]
            properties:
              whtTypeId: { type: integer }
              baseAmount: { type: number }
        lines:
          type: array
          description: 'Non-VAT standalone receipt lines (cash bill) — only when applications is empty. No VAT field (ม.86).'
          items:
            type: object
            required: [descriptionTh, quantity, unitPrice, amount]
            properties:
              descriptionTh: { type: string }
              quantity: { type: number }
              unitPrice: { type: number }
              amount: { type: number }
              productId: { type: integer, format: int64, nullable: true }
              productCode: { type: string, nullable: true }
              productType: { type: string, default: GOOD }
              uomText: { type: string, nullable: true }

    # === Vendor Invoice — Sprint 5.5/6 shipped contract ===
    CreateVendorInvoiceRequest:
      type: object
      required: [doc_date, vendor_id, vendor_tax_invoice_no, vendor_tax_invoice_date,
                 currency_code, exchange_rate, lines]
      properties:
        doc_date: { type: string, format: date, description: 'Our recording date (Asia/Bangkok today)' }
        vendor_id: { type: integer, format: int64 }
        vendor_tax_invoice_no: { type: string, maxLength: 50, description: "Vendor's ใบกำกับภาษีซื้อ no. (snapshot)" }
        vendor_tax_invoice_date: { type: string, format: date, description: "Vendor's TI date — anchors the ม.82/4 window" }
        vat_claim_period:
          type: integer
          nullable: true
          description: |
            yyyymm. Must fall within [TI_month .. TI_month+6]. Null → default to period
            of vendor_tax_invoice_date. Target period must be open.
          example: 202604
        currency_code: { type: string, minLength: 3, maxLength: 3, default: THB }
        exchange_rate: { type: number, exclusiveMinimum: 0, default: 1 }
        notes: { type: string, nullable: true }
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [expense_category_id, description, amount, vat_rate]
            properties:
              expense_category_id: { type: integer, description: 'Drives is_recoverable_vat/is_capex/is_cogs snapshot' }
              expense_account_id:
                type: integer
                format: int64
                nullable: true
                description: 'Null → resolve from category default at draft create'
              description: { type: string, maxLength: 500 }
              amount: { type: number, exclusiveMinimum: 0, description: 'Net, ex-VAT' }
              vat_rate: { type: number, minimum: 0, maximum: 1, description: '0.07 = 7%, 0 = zero-rate' }

    VendorInvoicePostedResult:
      type: object
      properties:
        vendor_invoice_id: { type: integer, format: int64 }
        doc_no: { type: string, description: 'VI-NNNN format, allocated on POST' }
        posted_at: { type: string, format: date-time }
        total_amount: { type: number }
        vat_amount: { type: number }
        vat_claim_period: { type: integer, description: 'yyyymm — appears in tax.input_vat_register for this period' }

    VendorInvoiceListItem:
      type: object
      properties:
        vendor_invoice_id: { type: integer, format: int64 }
        doc_no: { type: string, nullable: true, description: 'Null while Draft, allocated on Post' }
        doc_date: { type: string, format: date }
        vendor_name: { type: string }
        vendor_tax_id: { type: string, nullable: true }
        vendor_tax_invoice_no: { type: string }
        vat_claim_period: { type: integer }
        total_amount: { type: number }
        vat_amount: { type: number }
        settled_amount: { type: number }
        settlement_status: { type: string, enum: [UNPAID, PARTIAL, PAID] }
        status: { type: string, enum: [Draft, Posted, Voided] }
        currency_code: { type: string }

    VendorInvoiceLineView:
      type: object
      properties:
        line_no: { type: integer }
        expense_category_id: { type: integer }
        expense_account_id: { type: integer, format: int64 }
        description: { type: string }
        amount: { type: number }
        vat_rate: { type: number }
        vat_amount: { type: number }
        is_recoverable_vat: { type: boolean, description: 'Snapshot at draft. Non-rec (ENT/VEHI per ม.82/5) lumps VAT into expense.' }
        is_capex: { type: boolean }
        is_cogs: { type: boolean }

    VendorInvoiceDetail:
      type: object
      properties:
        vendor_invoice_id: { type: integer, format: int64 }
        doc_no: { type: string, nullable: true }
        status: { type: string, enum: [Draft, Posted, Voided] }
        doc_date: { type: string, format: date }
        vendor_tax_invoice_no: { type: string }
        vendor_tax_invoice_date: { type: string, format: date }
        vat_claim_period: { type: integer }
        vendor_id: { type: integer, format: int64 }
        vendor_name: { type: string }
        vendor_tax_id: { type: string, nullable: true }
        vendor_branch_code: { type: string, nullable: true }
        vendor_address: { type: string, nullable: true }
        currency_code: { type: string }
        exchange_rate: { type: number }
        subtotal_amount: { type: number }
        vat_amount: { type: number }
        non_recoverable_vat_amount: { type: number }
        total_amount: { type: number }
        settled_amount: { type: number }
        settlement_status: { type: string, enum: [UNPAID, PARTIAL, PAID] }
        notes: { type: string, nullable: true }
        posted_at: { type: string, format: date-time, nullable: true }
        lines:
          type: array
          items: { $ref: '#/components/schemas/VendorInvoiceLineView' }

    # === Payment Voucher — Sprint 5/6 shipped contract ===
    CreatePaymentVoucherRequest:
      type: object
      required: [doc_date, vendor_id, expense_category_id, payment_method,
                 currency_code, exchange_rate, lines]
      properties:
        doc_date: { type: string, format: date }
        vendor_id: { type: integer, format: int64 }
        expense_category_id: { type: integer, description: 'Header-level — drives PV sub-prefix (e.g. PV-RENT-NNNN)' }
        payment_method:
          type: string
          enum: [Cash, Transfer, Cheque, Credit]
          description: 'Enum is serialized as string (JsonStringEnumConverter, runtime-gotchas §3)'
        cheque_no: { type: string, nullable: true, description: 'Required when payment_method=Cheque' }
        cheque_date: { type: string, format: date, nullable: true, description: 'Required when payment_method=Cheque' }
        bank_account_id: { type: integer, format: int64, nullable: true }
        currency_code: { type: string, minLength: 3, maxLength: 3, default: THB }
        exchange_rate: { type: number, exclusiveMinimum: 0, default: 1 }
        description: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        vendor_invoice_id:
          type: integer
          format: int64
          nullable: true
          description: 'Set → PV settles a posted VI (GL: Dr AP). Null → standalone PV (GL: Dr Expense).'
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [description, amount, vat_rate, is_recoverable_vat, wht_rate]
            properties:
              expense_account_id:
                type: integer
                format: int64
                nullable: true
                description: 'Null → resolve from PV expense-category default'
              description: { type: string, maxLength: 500 }
              amount: { type: number, exclusiveMinimum: 0 }
              tax_code_id: { type: integer, nullable: true }
              vat_rate: { type: number, minimum: 0, maximum: 1 }
              is_recoverable_vat: { type: boolean }
              wht_type_id: { type: integer, nullable: true }
              wht_rate: { type: number, minimum: 0, maximum: 1, description: 'WHT base = net of VAT per ม.50ทวิ' }

    PaymentVoucherApprovedResult:
      type: object
      properties:
        payment_voucher_id: { type: integer, format: int64 }
        approved_by: { type: integer, format: int64 }
        approved_at: { type: string, format: date-time }

    PaymentVoucherPostedResult:
      type: object
      properties:
        payment_voucher_id: { type: integer, format: int64 }
        doc_no: { type: string, description: 'PV-{SubPrefix}-NNNN (e.g. PV-RENT-0001)' }
        posted_at: { type: string, format: date-time }
        total_paid: { type: number, description: 'Cash actually disbursed (gross - WHT)' }
        vat_amount: { type: number }
        wht_amount: { type: number }
        wht_certificate_id: { type: integer, format: int64, nullable: true }
        wht_cert_no: { type: string, nullable: true, description: 'WHT-NNNN when WHT > 0' }

    PaymentVoucherListItem:
      type: object
      properties:
        payment_voucher_id: { type: integer, format: int64 }
        doc_no: { type: string, nullable: true }
        doc_date: { type: string, format: date }
        vendor_name: { type: string }
        expense_category_code: { type: string }
        payment_method: { type: string, enum: [Cash, Transfer, Cheque, Credit] }
        total_paid: { type: number }
        wht_amount: { type: number }
        status: { type: string, enum: [Draft, Approved, Posted, Voided] }
        vendor_invoice_id: { type: integer, format: int64, nullable: true, description: 'Non-null → this PV settles a VI' }
        currency_code: { type: string }

    PaymentVoucherDetail:
      type: object
      properties:
        payment_voucher_id: { type: integer, format: int64 }
        doc_no: { type: string, nullable: true }
        status: { type: string, enum: [Draft, Approved, Posted, Voided] }
        doc_date: { type: string, format: date }
        vendor_id: { type: integer, format: int64 }
        vendor_name: { type: string }
        expense_category_id: { type: integer }
        payment_method: { type: string, enum: [Cash, Transfer, Cheque, Credit] }
        cheque_no: { type: string, nullable: true }
        cheque_date: { type: string, format: date, nullable: true }
        bank_account_id: { type: integer, format: int64, nullable: true }
        currency_code: { type: string }
        exchange_rate: { type: number }
        subtotal_amount: { type: number }
        vat_amount: { type: number }
        wht_amount: { type: number }
        total_paid: { type: number }
        description: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        vendor_invoice_id: { type: integer, format: int64, nullable: true }
        approved_by: { type: integer, format: int64, nullable: true }
        approved_at: { type: string, format: date-time, nullable: true }
        posted_at: { type: string, format: date-time, nullable: true }
        wht_certificate_id: { type: integer, format: int64, nullable: true }

    # === Master Data ===
    CustomerCreateRequest:
      type: object
      required: [customer_code, name_th, customer_type]
      properties:
        customer_code: { type: string }
        customer_type:
          type: string
          enum: [INDIVIDUAL, CORPORATE]
        tax_id: { type: string, nullable: true }
        branch_code: { type: string, nullable: true }
        name_th: { type: string }
        name_en: { type: string, nullable: true }
        vat_registered: { type: boolean, default: false }
        billing_address: { type: string }
        contact_person: { type: string }
        phone: { type: string }
        email: { type: string, format: email }
        credit_limit: { type: number, default: 0 }
        payment_term_days: { type: integer, default: 0 }

    ProductCreateRequest:
      type: object
      required: [product_code, name_th, product_type, base_uom_id]
      properties:
        product_code: { type: string, description: SKU code }
        name_th: { type: string }
        name_en: { type: string, nullable: true }
        product_type:
          type: string
          enum: [GOOD, SERVICE]
        base_uom_id: { type: integer }
        list_price: { type: number, default: 0 }
        default_output_tax_code: { type: string }
        default_input_tax_code: { type: string }

    ExpenseCategory:
      type: object
      properties:
        category_id: { type: integer }
        category_code: { type: string, example: RENT }
        name_th: { type: string }
        name_en: { type: string }
        is_capex: { type: boolean }
        is_cogs: { type: boolean }
        default_expense_account_id: { type: integer, nullable: true }
        default_tax_code_id: { type: integer, nullable: true }
        default_wht_type_id: { type: integer, nullable: true }

    SystemInfo:
      type: object
      description: 'vat_mode/vat_rate/pnd30_submission_mode are the CALLER COMPANY''s values (per-company-vat-mode spec, 2026-06-11).'
      properties:
        version: { type: string }
        vat_mode: { type: boolean }
        vat_rate: { type: number }
        pnd30_submission_mode:
          type: string
          enum: [auto, manual]
        document_number_format: { type: string, example: MM-YYYY-PREFIX-NNNN }
        timezone: { type: string, example: Asia/Bangkok }

    Company:
      type: object
      properties:
        companyId: { type: integer }
        taxId: { type: string, description: '13-digit Thai Tax ID' }
        nameTh: { type: string }
        nameEn: { type: string, nullable: true }
        legalEntityType: { type: string }
        vatRegistered: { type: boolean, description: 'Per-company VAT mode (§4.6)' }
        baseCurrency: { type: string, example: THB }
        isActive: { type: boolean }
        paidUpCapital: { type: number, nullable: true }
        vatRate: { type: number, example: 0.07, description: 'Per-company standard VAT rate' }
        pnd30SubmissionMode: { type: string, enum: [manual, auto] }

    CompanyDetail:
      allOf:
        - $ref: '#/components/schemas/Company'
        - type: object
          properties:
            registrationDate: { type: string, format: date, nullable: true }
            vatRegisterDate: { type: string, format: date, nullable: true }
            fiscalYearStartMonth: { type: integer, minimum: 1, maximum: 12 }
            addressTh: { type: string, nullable: true }
            subDistrict: { type: string, nullable: true }
            district: { type: string, nullable: true }
            province: { type: string, nullable: true }
            postalCode: { type: string, nullable: true }
            phone: { type: string, nullable: true }
            email: { type: string, nullable: true }

    CreateCompanyRequest:
      type: object
      required: [taxId, nameTh, legalEntityType, vatRegistered, fiscalYearStartMonth]
      properties:
        taxId: { type: string }
        nameTh: { type: string }
        nameEn: { type: string, nullable: true }
        legalEntityType: { type: string }
        registrationDate: { type: string, format: date, nullable: true }
        vatRegistered: { type: boolean }
        vatRegisterDate: { type: string, format: date, nullable: true }
        fiscalYearStartMonth: { type: integer, minimum: 1, maximum: 12 }
        addressTh: { type: string, nullable: true }
        subDistrict: { type: string, nullable: true }
        district: { type: string, nullable: true }
        province: { type: string, nullable: true }
        postalCode: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        paidUpCapital: { type: number, nullable: true }
        vatRate: { type: number, minimum: 0, maximum: 1, default: 0.07 }
        pnd30SubmissionMode: { type: string, enum: [manual, auto], default: manual }

    UpdateCompanyRequest:
      type: object
      required: [nameTh, vatRegistered, isActive]
      properties:
