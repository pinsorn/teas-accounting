      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
        - name: estimatedProfit
          in: query
          required: true
          schema: { type: number }
        - name: whtH1
          in: query
          schema: { type: number, default: 0 }
        - name: isSme
          in: query
          schema: { type: boolean, default: false }
      responses:
