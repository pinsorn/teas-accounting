openapi: 3.0.3
info:
  title: Thailand Enterprise Accounting System API
  description: |
    REST API สำหรับระบบบัญชี enterprise ของไทย

    **Authentication:** API Key + HMAC signature, OR OAuth2 client_credentials
    **Idempotency:** ทุก POST/PUT ต้องมี Idempotency-Key header (UUID v4)
    **Rate limit:** 1,000 req/min per API key (default)
  version: 1.0.0
  contact:
    name: API Support
    email: api-support@example.com

servers:
  - url: https://api.accounting.example.com/v1
    description: Production
  - url: https://api-staging.accounting.example.com/v1
    description: Staging

security:
  - ApiKeyAuth: []
  - OAuth2: [read, write]

paths:
  # ============================================================
  # QUOTATIONS
  # ============================================================
  /quotations:
    post:
      summary: สร้างใบเสนอราคา (Draft)
      tags: [Quotations]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotationCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quotation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      summary: ค้นหา/list ใบเสนอราคา
      tags: [Quotations]
      parameters:
        - name: customer_id
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, SUBMITTED, SENT, ACCEPTED, REJECTED, EXPIRED, CANCELLED]
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotationList'

  /quotations/{id}:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: ดูใบเสนอราคา
      tags: [Quotations]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quotation'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: แก้ไขใบเสนอราคา (Draft only)
      tags: [Quotations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotationUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quotation'

  /quotations/{id}/submit:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: ส่งใบเสนอราคาให้ลูกค้า (mark Sent)
      tags: [Quotations]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quotation'

  /quotations/{id}/accept:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Mark ใบเสนอราคาว่า accepted (สามารถ convert เป็น SO)
      tags: [Quotations]
      responses:
        '200':
          description: OK

  /quotations/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: ยกเลิกใบเสนอราคา
      tags: [Quotations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: OK

  /quotations/{id}/revise:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: สร้างเวอร์ชันใหม่ (v2) ของใบเสนอราคา
      tags: [Quotations]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quotation'

  /quotations/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: Download PDF
      tags: [Quotations]
      responses:
        '200':
          description: OK
          content:
            application/pdf: {}

  # ============================================================
  # SALES ORDERS
  # ============================================================
  /sales-orders:
    post:
      summary: สร้าง Sales Order
      tags: [Sales Orders]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrderCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'

  /sales-orders/{id}/confirm:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: ยืนยัน Sales Order
      tags: [Sales Orders]
      responses:
        '200':
          description: OK

  /sales-orders/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: ยกเลิก Sales Order
      tags: [Sales Orders]
      responses:
        '200':
          description: OK

  # ============================================================
  # DELIVERY ORDERS
  # ============================================================
  /delivery-orders:
    post:
      summary: สร้าง Delivery Order
      tags: [Delivery Orders]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryOrderCreateRequest'
      responses:
        '201':
          description: Created

  /delivery-orders/{id}/post:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Post DO (mark shipped, no stock impact)
      tags: [Delivery Orders]
      responses:
        '200':
          description: OK

  # ============================================================
  # TAX INVOICES ★ (e-Tax compliant)
  # ============================================================
  /tax-invoices:
    get:
      summary: List ใบกำกับภาษี (cursor-paginated, newest first)
      tags: [Tax Invoices]
      description: |
        Cursor-paginated list, sorted by `taxInvoiceId` descending (recent first).
        Pass the previous response's `nextCursor` to fetch the next page.
      parameters:
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
        - name: customerId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema:
            type: string
            enum: [Draft, Posted]
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: cursor
          in: query
          description: 'Pass `nextCursor` from previous response. Omit for first page.'
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxInvoiceListResponse'
    post:
      summary: สร้างใบกำกับภาษี (Draft)
      tags: [Tax Invoices]
      description: |
        Creates a Draft Tax Invoice. To finalize and send e-Tax, call POST /tax-invoices/{id}/post.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxInvoiceCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxInvoice'

  /tax-invoices/{id}/post:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Post + sign XML + email customer + cc RD (IRREVERSIBLE)
      tags: [Tax Invoices]
      description: |
        Posts the Tax Invoice. This action:
        1. Assigns next document number
        2. Signs XML with company CA certificate (XAdES-BES)
        3. Generates PDF/A-3 with embedded signed XML
        4. Sends email to customer + cc csemail@rd.go.th
        5. Marks status = POSTED (immutable)

        **After posting, any correction must use Credit Note.**
      responses:
        '200':
          description: Posted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxInvoice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Already posted or invalid state

  /tax-invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: ดูใบกำกับภาษี
      tags: [Tax Invoices]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxInvoice'

  /tax-invoices/{id}/xml:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: Download signed XML
      tags: [Tax Invoices]
      responses:
        '200':
          description: OK
          content:
            application/xml: {}

  /tax-invoices/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: Download PDF/A-3 (with embedded XML)
      tags: [Tax Invoices]
      responses:
        '200':
          description: OK
          content:
            application/pdf: {}

  /tax-invoices/{id}/etax-status:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: เช็คสถานะ e-Tax submission
      tags: [Tax Invoices]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtaxStatus'

  /tax-invoices/{id}/resend:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: ส่ง email ลูกค้าใหม่ (ไม่ส่ง RD ซ้ำ)
      tags: [Tax Invoices]
      responses:
        '200':
          description: OK

  # ============================================================
  # CREDIT / DEBIT NOTES ★
  # ============================================================
  /credit-notes:
    post:
      summary: สร้างใบลดหนี้ (ต้องอ้างอิง Tax Invoice เดิม)
      tags: [Credit Notes]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditNoteCreateRequest'
      responses:
        '201':
          description: Created

  /credit-notes/{id}/post:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Post + ส่ง e-Tax + email
      tags: [Credit Notes]
      responses:
        '200':
          description: OK

  /debit-notes:
    post:
      summary: สร้างใบเพิ่มหนี้
      tags: [Debit Notes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebitNoteCreateRequest'
      responses:
        '201':
          description: Created

  # ============================================================
  # CUSTOMER RECEIPTS (รับเงินจากลูกค้า)
  # ============================================================
  /customer-receipts:
    post:
      summary: บันทึกรับเงินจากลูกค้า
      tags: [Customer Receipts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerReceiptCreateRequest'
      responses:
        '201':
          description: Created

  # ============================================================
  # VENDOR INVOICES (ใบกำกับภาษีซื้อ) — Sprint 5.5/6
  # ============================================================
  /vendor-invoices:
    post:
      summary: สร้าง Vendor Invoice draft (ใบกำกับภาษีซื้อ)
      description: |
        Create a Draft VendorInvoice. Lines snapshot expense category defaults
        (is_recoverable_vat, is_capex, is_cogs, expense_account_id) at draft time —
        category changes don't retroactively affect posted GL.
      tags: [Vendor Invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVendorInvoiceRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  vendor_invoice_id: { type: integer, format: int64 }
        '400': { description: Validation error }
        '403': { description: Missing purchase.vendor_invoice.create permission }

    get:
      summary: List Vendor Invoices (cursor-paginated)
      tags: [Vendor Invoices]
      parameters:
        - name: cursor
          in: query
          schema: { type: integer, format: int64, nullable: true }
          description: VendorInvoiceId of the last row of the previous page
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/VendorInvoiceListItem' }
                  next_cursor: { type: integer, format: int64, nullable: true }

  /vendor-invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: Vendor Invoice detail
      tags: [Vendor Invoices]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VendorInvoiceDetail' }
        '404': { description: Not found }
    put:
      summary: Update Vendor Invoice draft (only while status=Draft)
      tags: [Vendor Invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVendorInvoiceRequest' }
      responses:
        '204': { description: Updated }
        '409': { description: Cannot edit posted invoice (immutability) }

  /vendor-invoices/{id}/claim-period:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Set/move VAT input-claim period (ม.82/4 — within [TI month .. +6])
      description: |
        Adjust `vat_claim_period` (INT yyyymm) on a Draft VendorInvoice. Must fall
        within the 7-period window anchored to `vendor_tax_invoice_date`. The target
        period MUST be open (closed periods rejected — match `EnsureOpenAsync` semantics).
      tags: [Vendor Invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vat_claim_period]
              properties:
                vat_claim_period:
                  type: integer
                  description: yyyymm format, e.g. 202604
                  example: 202604
      responses:
        '204': { description: Updated }
        '400': { description: Out of ม.82/4 window or target period closed }

  /vendor-invoices/{id}/post:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Post Vendor Invoice → allocate doc_no, write GL JV (Dr Expense/InputVAT, Cr AP)
      tags: [Vendor Invoices]
      responses:
        '200':
          description: Posted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VendorInvoicePostedResult' }
        '409': { description: Not in Draft / closed period / immutability violation }

  # ============================================================
  # PAYMENT VOUCHERS (จ่ายเงิน) — Sprint 5/6 (B2 approve workflow)
  # ============================================================
  /payment-vouchers:
    post:
      summary: สร้าง Payment Voucher draft (require expense_category at header)
      description: |
        Create a Draft PV. If `vendor_invoice_id` is set, the PV will settle that
        posted VendorInvoice on Post (GL becomes Dr AP / Cr Bank-Cash / Cr WHT-Payable).
        Standalone PV (no `vendor_invoice_id`) keeps the original behavior (Dr Expense).
      tags: [Payment Vouchers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePaymentVoucherRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_voucher_id: { type: integer, format: int64 }
        '400': { description: Validation error }

    get:
      summary: List Payment Vouchers (cursor-paginated)
      tags: [Payment Vouchers]
      parameters:
        - name: cursor
          in: query
          schema: { type: integer, format: int64, nullable: true }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PaymentVoucherListItem' }
                  next_cursor: { type: integer, format: int64, nullable: true }

  /payment-vouchers/{id}:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: Payment Voucher detail
      tags: [Payment Vouchers]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentVoucherDetail' }
        '404': { description: Not found }

  /payment-vouchers/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Approve PV (B2 — SoD enforced; approver ≠ creator)
      description: |
        Transitions Draft → Approved and stamps `approved_by`/`approved_at`.
        Requires `purchase.payment_voucher.approve` permission. The approver MAY also
        be the poster (2-person SME accommodation), but MUST NOT be the creator.
        Backed by DB CHECK `ck_pv_sod = (approved_by IS NULL) OR (approved_by <> created_by)`.
      tags: [Payment Vouchers]
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentVoucherApprovedResult' }
        '403':
          description: SoD violation — approver is the same user who created the PV
        '409': { description: PV not in Draft status }

  /payment-vouchers/{id}/post:
    parameters:
      - $ref: '#/components/parameters/DocId'
    post:
      summary: Post Payment Voucher (must be Approved first) → write GL JV
      description: |
        Standalone PV: Dr Expense / Cr Bank-Cash / Cr WHT-Payable.
        PV-settles-VI: Dr AP 2110 / Cr Bank-Cash / Cr WHT-Payable (expense already booked at VI POST).
        Also updates the linked VI's `settled_amount` and `settlement_status` (UNPAID→PARTIAL→PAID).
      tags: [Payment Vouchers]
      responses:
        '200':
          description: Posted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentVoucherPostedResult' }
        '409':
          description: Not Approved, or over-settles VI (settled+applied > total + 0.01 tol)

  /payment-vouchers/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/DocId'
    get:
      summary: Download PV as PDF (50ทวิ WHT certificate inline if WHT > 0)
      tags: [Payment Vouchers]
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf:
              schema: { type: string, format: binary }

  # ============================================================
  # MASTER DATA
  # ============================================================
  /customers:
    get:
      summary: List / search ลูกค้า (paginated)
      tags: [Master Data]
      description: |
        Page-based list with optional case-insensitive search across name (TH/EN) and tax_id.
        Returns array of minimal customer rows for selectors + reports.
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: 'Substring match on customer name (TH/EN) or tax_id'
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerListItem'
    post:
      summary: สร้างลูกค้า
      tags: [Master Data]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '201':
          description: Created

  /customers/search:
    get:
      summary: ค้นหาลูกค้า (legacy — prefer GET /customers?search=)
      deprecated: true
      tags: [Master Data]
      parameters:
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK

  /products:
    get:
      summary: ค้นหา/list SKU
      tags: [Master Data]
      parameters:
        - name: sku
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
    post:
      summary: สร้าง SKU/Product
      tags: [Master Data]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Created

  /expense-categories:
    get:
      summary: List expense categories
      tags: [Master Data]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseCategory'

  # ============================================================
  # REPORTS
  # ============================================================
  /reports/number-gaps:
    get:
      summary: Number-gap audit (compliance §17.6 / §4.3)
      tags: [Reports]
      description: |
        Returns any missing sequence numbers within the issued range for the given period.
        A row here = a numbering defect. In production this MUST be empty for every period.
        Backed by view `tax.v_number_gaps`. Tenant-scoped.
        Permission: `report.audit.read`.
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer, example: 2026 }
        - name: month
          in: query
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
        - name: doc_type
          in: query
          description: 'Filter by document type (e.g. TI, RC, CN, DN, PV). Omit for all.'
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumberGapsResponse'
        '403':
          description: Missing `report.audit.read` permission

  /reports/vat-output-register:
    get:
      summary: รายงานภาษีขาย (ม.87(1))
      tags: [Reports]
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
        - name: month
          in: query
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        '200':
          description: OK

  /reports/vat-input-register:
    get:
      summary: รายงานภาษีซื้อ (ม.87(2))
      tags: [Reports]
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
        - name: month
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK

  /reports/expense-by-category:
    get:
      summary: รายงานค่าใช้จ่ายตาม expense category
      tags: [Reports]
      parameters:
        - name: year
          in: query
          required: true
