  /tax-filings/pnd51/pdf:
    get:
      summary: ภ.ง.ด.51 (ม.67ทวิ method A) — mid-year CIT prepayment PDF
      description: >
        Fills the official RD ภ.ง.ด.51 AcroForm. estimatedProfit = taxpayer's full-year estimate
        (omit → H1 net profit × 2 from P&L). fillWorksheet=true additionally fills the page-2
        การคำนวณภาษี worksheet; ALL five attest* flags must then be true and the figures must foot
        (clean, general-rate, first filing) or the service returns 422
        `pnd51.worksheet_not_attestable` — a blank box on this form asserts zero (ภ.ง.ด.51 §4).
      tags: [Tax Filings]
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
          description: CE fiscal year (start year of the accounting period)
        - name: estimatedProfit
          in: query
          schema: { type: number }
        - name: whtH1
          in: query
          schema: { type: number, default: 0 }
        - name: isSme
          in: query
          schema: { type: boolean, default: false }
        - name: fillWorksheet
          in: query
          schema: { type: boolean, default: false }
        - name: attestFirstFiling
          in: query
          schema: { type: boolean, default: false }
          description: ยื่นปกติ ไม่ใช่ยื่นเพิ่มเติม (page-2 prior-paid box = 0)
        - name: attestNoLossCf
          in: query
          schema: { type: boolean, default: false }
          description: ไม่มีขาดทุนสุทธิยกมา (box 55 = 0)
        - name: attestNoExemption
          in: query
          schema: { type: boolean, default: false }
          description: ไม่มีกำไรที่ได้รับยกเว้น (box 56 = 0)
        - name: attestNoRateReduction
          in: query
          schema: { type: boolean, default: false }
          description: ไม่มีภาษีส่วนลดอัตรา (box 34 = 0)
        - name: attestNoSurcharge
          in: query
          schema: { type: boolean, default: false }
          description: ไม่มีเงินเพิ่ม ม.27/ม.67ตรี (box 38 = 0)
      responses:
        '200':
          description: PDF (2 pages; page 2 filled only when attested)
          content:
            application/pdf: {}
        '422':
          description: pnd51.worksheet_not_attestable — worksheet requested but not attestable/footing

  /tax-filings/pnd50/pdf:
    get:
      summary: ภ.ง.ด.50 (annual CIT return) v2 — p1 + p2 รายการที่ 1 + p3 ladder + p6 งบฐานะ PDF
      description: >
        Fills the official RD ภ.ง.ด.50 AcroForm (v2 scope: page-1 header + page-2 การคำนวณภาษี +
        page-3 รายการที่ 2/3 ladder (ม.65ทวิ/ตรี) + page-6 งบแสดงฐานะการเงิน — all from real data).
        Figures come from the CIT data layer (CitProfile, ภ.ง.ด.51 estimate/prepaid store, FY
        WHT-receivable register, BalanceSheet, CitCalculator + ม.67ตรี penalty). Both attest flags
        must be true (pages 4–5 ต้นทุน/ขายบริหาร detail, page 7 แบบแจ้งกรรมการ and the ใบแนบ still
        print blank → 422 `pnd50.not_attestable`), and the year must carry no refusal condition
        (`pnd50.override_breaks_ladder` — override disagrees with the books; `pnd50.ladder_sign_flip`
        — adjustments flip the running total mid-ladder; `pnd50.surcharge_with_overpaid`) or the
        service returns 422 `pnd50.not_renderable`. A blank box on this form asserts zero (ภ.ง.ด.50 §4).
      tags: [Tax Filings]
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
          description: CE fiscal year (start year of the accounting period)
        - name: isSme
          in: query
          schema: { type: boolean, nullable: true }
          description: omit → auto from CitProfile (paid-up ≤5M ∧ revenue ≤30M)
        - name: hasRelatedParty
          in: query
          schema: { type: boolean, default: false }
          description: ม.71ทวิ related-party radio (มี → annual disclosure report required)
        - name: attestFirstFiling
          in: query
          schema: { type: boolean, default: false }
          description: ยื่นปกติ ครั้งแรก (ไม่ใช่ยื่นเพิ่มเติม)
        - name: attestBlankSchedules
          in: query
          schema: { type: boolean, default: false }
          description: รับทราบว่า หน้า 4–5, หน้า 7 และใบแนบ พิมพ์ว่าง ต้องกรอกเองก่อนยื่นจริง
      responses:
        '200':
          description: PDF (7 pages; v2 fills pages 1–3 + page 6)
          content:
            application/pdf: {}
        '422':
          description: pnd50.not_attestable (attestation missing) or pnd50.not_renderable (refusal condition)

  /tax-filings/pnd50/preview:
    get:
      summary: ภ.ง.ด.50 dashboard dry-run — every figure the filler will print (single source)
      description: >
        JSON preview for the CIT filing dashboard, derived from the SAME composition the PDF filler
        uses (no duplicated maths). Never 422s for a refusal: those are listed in `refusals[]` (the
        /pdf endpoint 422s on the same codes). `ladder` is null only when a refusal prevented
        building it. Includes the p3 ladder, p6 balance-sheet totals, the per-certificate WHT credit
        (50ทวิ), the ภ.ง.ด.51 estimate/prepaid, and the ม.67ตรี surcharge.
      tags: [Tax Filings]
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
          description: CE fiscal year (start year of the accounting period)
        - name: isSme
          in: query
          schema: { type: boolean, nullable: true }
          description: omit → auto from CitProfile (paid-up ≤5M ∧ revenue ≤30M)
      responses:
        '200':
          description: Preview figures + refusal codes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pnd50Preview' }

  /tax-filings/pnd51/estimate:
    post:
      summary: บันทึกประมาณการ ภ.ง.ด.51 (ม.67ตรี) — persist the method-A estimate + prepaid
      description: >
        Stores the full-year profit estimate and the computed ม.67ทวิ prepayment on the per-FY CIT store
        (tax.cit_year_summaries) so the year-end ภ.ง.ด.50 can run the ม.67ตรี under-estimate
