  # ============================================================
  # ME — Current-user introspection (Sprint 13d P3)
  # ============================================================
  /me/permissions:
    get:
      summary: Get current user's permission scopes
      description: |
        Returns the flat list of permission scopes for the current authenticated
        user, derived from their assigned roles. Used by frontend `usePermissions`
        + `<PermissionGate>` to hide write buttons when user lacks the scope.

        Claims-sourced (no DB query). Cached client-side per session.
      tags: [Auth]
      responses:
        '200':
          description: OK — list of scopes + role names + super-admin flag
          content:
            application/json:
              schema:
                type: object
                required: [permissions, roles, isSuperAdmin]
                properties:
                  permissions:
                    type: array
                    items: { type: string, example: 'master.business_unit.manage' }
                    description: 'Flat list of permission scopes (RBAC).'
                  roles:
                    type: array
                    items: { type: string, example: 'ACCOUNTANT' }
                  isSuperAdmin:
                    type: boolean
                    description: 'True if SUPER_ADMIN role; bypasses some scope checks.'
        '401':
          $ref: '#/components/responses/ErrorEnvelope401'

